# SonarQube Cloud analysis configuration for the Archon secure-fix workflow.
# projectKey and organization must match the project already created in SonarQube Cloud.
sonar.projectKey=coleam00_ai-transformation-workshop
sonar.organization=coleam00
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/.archon/**,**/.agents/**

sonar.sourceEncoding=UTF-8
